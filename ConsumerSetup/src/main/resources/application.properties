# Spring Boot Server Configuration
server.port=8082
spring.application.name=consumer-setup

# Kafka Consumer Configuration
# Bootstrap servers: Include BOTH brokers for high availability failover
spring.kafka.bootstrap-servers=localhost:9092,localhost:9192
spring.kafka.consumer.group-id=order-consumer-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer


spring.kafka.consumer.properties.spring.json.trusted.packages=org.example.model
spring.kafka.consumer.properties.spring.json.value.default.type=org.example.model.Order

# Timeout settings for connection stability
spring.kafka.properties.connections.max.idle.ms=540000

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.kafka=DEBUG
logging.level.org.example=DEBUG

