# Spring Boot Server Configuration
server.port=8080

# Kafka Producer Configuration
# Bootstrap servers: Include BOTH brokers for high availability failover
spring.kafka.bootstrap-servers=localhost:9092,localhost:9192
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Producer Acknowledgment Settings
# acks=all ensures all replicas acknowledge before producer returns success
spring.kafka.producer.acks=all
spring.kafka.producer.retries=5
spring.kafka.producer.retry-backoff-ms=100
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=100
spring.kafka.producer.buffer-memory=33554432

# Kafka Properties - High Availability & Reliability
spring.kafka.properties.enable.idempotence=true
spring.kafka.properties.max.in.flight.requests.per.connection=5

# Metadata refresh interval (in case of broker failures)
spring.kafka.properties.metadata.max.age.ms=30000

# Timeout settings for connection stability
spring.kafka.properties.connections.max.idle.ms=540000

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.kafka=DEBUG
logging.level.org.example=DEBUG

